# SEC-INFRA-001 FIX: All critical actions (checkout, setup-node, cache) are
# pinned to full commit SHAs instead of mutable version tags (e.g. @v4).
# WHY: Mutable tags like @v4 can be silently updated by the action author
# (or a compromised account) to point to different code. A supply-chain attack
# could inject malicious steps into every CI run without changing this file.
# SHA pinning guarantees the exact commit that was reviewed is what runs.
# SHAs were captured on 2026-03-22. Bump them when upstream releases security patches.
name: CI

on:
  pull_request:
    branches: [main]
    # Cost-optimization (2026-04-30): skip the entire CI workflow when a PR
    # changes ONLY non-deployable, non-code files. GitHub Actions matches
    # paths-ignore as AND-glued — the workflow skips iff every changed file
    # matches at least one pattern.
    #
    # WHY each entry:
    #   **/*.md                  Markdown anywhere (READMEs, ad-hoc notes). Project
    #                            planning .md files are gitignored already; this
    #                            covers any committed Markdown.
    #   docs/**                  Defense-in-depth (docs/ is gitignored, but a
    #                            future un-ignore should not silently re-trigger CI).
    #   public/marketing/**      Marketing assets — runtime-irrelevant.
    #   public/screenshots/**    Screenshot updates — runtime-irrelevant.
    #   .gitignore, LICENSE,
    #   .editorconfig, .nvmrc    Repo-meta files that cannot affect build/runtime.
    #
    # NOT EXCLUDED (intentional):
    #   scripts/**     admin/service-role tooling — must be security-scanned
    #   __tests__/**   test changes are real code, must be validated
    #   *.test.*       same as above
    #   .github/**     workflow changes need their own validation
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'public/marketing/**'
      - 'public/screenshots/**'
      - '.gitignore'
      - 'LICENSE'
      - '.editorconfig'
      - '.nvmrc'
  # Bundle 1 — merge queue support (2026-04-30):
  # When the user enables GitHub merge queue (Settings > Branches > Branch
  # protection rules > "Require merge queue"), queued PRs are batched into
  # a temporary merge_group/* ref and validated against the actual merge
  # commit. This trigger lets the same CI workflow gate the queue, so 5
  # queued PRs become 1 CI run instead of 5. No code changes needed once
  # the queue is enabled in repo settings.
  merge_group:

concurrency:
  # Include event_name so PR runs and merge-queue runs don't cancel each other.
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # Placeholder env vars for build (real values in Vercel/runtime)
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_URL: https://placeholder.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
  POLAR_ACCESS_TOKEN: placeholder-polar-token
  POLAR_WEBHOOK_SECRET: placeholder-webhook-secret
  POLAR_ORGANIZATION_ID: placeholder-org-id
  EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  RESEND_API_KEY: re_placeholder_key
  # Bundle 2 — Turborepo remote cache (2026-04-30):
  # When TURBO_TOKEN and TURBO_TEAM are set in repo Actions secrets, Turbo
  # uploads/downloads task outputs from the configured remote cache (Vercel
  # Remote Cache by default; can be self-hosted). When unset, Turbo falls back
  # to local-only cache — still useful within a single CI run for tasks that
  # invoke each other, but no cross-run sharing. Setup: `npx turbo link` once,
  # then add the resulting token + team slug as repo secrets.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  # Per Turbo's recommendation: opt out of telemetry on CI runners.
  TURBO_TELEMETRY_DISABLED: '1'

# SEC-008 FIX: Explicit least-privilege permissions.
# WHY: Without a top-level permissions block, GitHub defaults to write access
# on all scopes. This restricts the entire workflow to read-only by default.
# Individual jobs that need write access (e.g., provenance, artifact upload)
# can override with job-level permissions.
permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Path-change detection (Bundle 1 / Tier 4) ───────────────────────────────
  # Inspects the diff of this PR (or merge group) and emits per-package booleans.
  # Downstream jobs use these via `if:` to skip when their files weren't touched.
  #
  # WHY inline git diff (not dorny/paths-filter):
  #   The repo pins every action to a SHA for supply-chain safety (SEC-INFRA-001).
  #   Adding a new third-party action means adding a new trust dependency. The
  #   inline approach uses only `git diff --name-only` (always-trusted toolchain)
  #   and is straightforward to audit.
  #
  # Logic:
  #   shared-changed:  any file under packages/styrby-shared/ — fans out to all
  #                    consumers (web, cli, mobile) so all build/test jobs run
  #   web-changed:     any file under packages/styrby-web/ OR root deps changed
  #                    OR vercel.json changed (Vercel-relevant root config)
  #   cli-changed:     any file under packages/styrby-cli/
  #   mobile-changed:  any file under packages/styrby-mobile/
  #   root-changed:    pnpm-lock.yaml, pnpm-workspace.yaml, root package.json,
  #                    .github/workflows/, .size-limit.js — anything that could
  #                    affect every package's build → forces all jobs to run
  #
  # Quality + security jobs ALWAYS run (lint catches anything; SAST/audit
  # must gate every PR regardless of scope).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      cli: ${{ steps.filter.outputs.cli }}
      mobile: ${{ steps.filter.outputs.mobile }}
      shared: ${{ steps.filter.outputs.shared }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Need the full base..head range to diff against; pull_request /
          # merge_group events provide both SHAs but we still need the commits
          # locally. fetch-depth: 0 fetches all history (~1-2s extra on this repo).
          fetch-depth: 0

      - name: Compute file scope
        id: filter
        env:
          # Resolve the comparison base across event types:
          #   pull_request:   compare PR head against PR base branch tip
          #   merge_group:    compare merge commit against the queued base
          #   push (future):  fall back to HEAD^
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          MG_BASE: ${{ github.event.merge_group.base_sha }}
          MG_HEAD: ${{ github.event.merge_group.head_sha }}
        run: |
          if [ -n "$PR_BASE" ] && [ -n "$PR_HEAD" ]; then
            BASE="$PR_BASE"
            HEAD="$PR_HEAD"
          elif [ -n "$MG_BASE" ] && [ -n "$MG_HEAD" ]; then
            BASE="$MG_BASE"
            HEAD="$MG_HEAD"
          else
            # Fallback (manual dispatch / push). Be conservative: run everything.
            BASE="HEAD~1"
            HEAD="HEAD"
          fi

          echo "Comparing $BASE..$HEAD"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || echo "")
          echo "Changed files:"
          echo "$CHANGED" | sed 's/^/  /'

          # Helper: emit "true" if any line matches the regex, else "false".
          match() {
            if echo "$CHANGED" | grep -qE "$1"; then echo "true"; else echo "false"; fi
          }

          # Universal triggers — anything that could affect every package.
          # When any of these change, force all jobs to run by setting every
          # output to true. Lockfile/workspace/root-package/workflow changes
          # all qualify; .size-limit.js affects the bundle-size job's gate.
          ROOT=$(match '^(pnpm-lock\.yaml|pnpm-workspace\.yaml|package\.json|\.size-limit\.js|\.github/workflows/)')

          if [ "$ROOT" = "true" ]; then
            echo "Root-level change detected; forcing all package builds."
            WEB=true; CLI=true; MOBILE=true; SHARED=true
          else
            WEB=$(match '^packages/styrby-web/|^packages/styrby-web/vercel\.json$')
            CLI=$(match '^packages/styrby-cli/')
            MOBILE=$(match '^packages/styrby-mobile/')
            SHARED=$(match '^packages/styrby-shared/')
          fi

          {
            echo "web=$WEB"
            echo "cli=$CLI"
            echo "mobile=$MOBILE"
            echo "shared=$SHARED"
            echo "root=$ROOT"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "Outputs: web=$WEB cli=$CLI mobile=$MOBILE shared=$SHARED root=$ROOT"

  # ─── Dependency review (PRs only) ───
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Dependency Graph is enabled in repo settings (Settings > Code security).
      # Enabled 2026-03-27 via GitHub API.
      # WHY continue-on-error: 9 upstream-locked CVEs remain (node-forge via Expo,
      # picomatch via chokidar, serialize-javascript via jest-expo, nodemailer via resend).
      # These cannot be fixed without upstream releases. Remove when Expo SDK 55+ ships.
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        continue-on-error: true
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense

  # ─── Quality gate: lint + typecheck ───
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache TypeScript build info
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/styrby-web/tsconfig.tsbuildinfo
            packages/styrby-shared/tsconfig.tsbuildinfo
            packages/styrby-cli/tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/tsconfig.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/tsconfig.json', 'pnpm-lock.yaml') }}-

      - name: Lint (if configured)
        run: pnpm run lint

      # Bundle 2 (Turbo): typecheck task in turbo.json depends on `^build`, so
      # turbo automatically builds @styrby/shared before typechecking any consumer.
      # All four typechecks share the same shared-build cache key — second
      # invocation hits cache when shared hasn't changed.
      - name: Type check (all packages, turbo-orchestrated)
        run: pnpm turbo run typecheck --filter=@styrby/shared --filter=styrby-cli --filter=styrby-web --filter=styrby-mobile

  # ─── Shared unit tests ───
  test-shared:
    name: Shared Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    # Only run when @styrby/shared source actually changed. CLI/web/mobile
    # consume shared via type imports; their own test jobs cover integration.
    if: needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run shared tests
        run: pnpm --filter @styrby/shared run test

  # ─── CLI unit tests ───
  # Cost-optimization (2026-04-30): downloads `shared-build` artifact instead
  # of rebuilding @styrby/shared locally. Previously this job built shared
  # TWICE (once "as a dependency", once "needed by CLI imports") — both removed.
  test-cli:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, build-shared]
    # Skip on PRs that don't touch CLI or shared (e.g., web-only or mobile-only
    # PRs). The CLI test suite installs ripgrep + difftastic and runs the
    # forked Happy Coder tests — heavy and irrelevant to those PRs.
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      # Install CLI tool binaries needed by ripgrep/difftastic test modules.
      # The forked Happy Coder code expects difft at tools/unpacked/difft
      # and ripgrep via scripts/ripgrep_launcher.cjs — symlink system binaries.
      - name: Install ripgrep and difftastic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ripgrep
          DIFFT_VERSION="0.63.0"
          curl -fsSL "https://github.com/Wilfred/difftastic/releases/download/${DIFFT_VERSION}/difft-x86_64-unknown-linux-gnu.tar.gz" | sudo tar -xz -C /usr/local/bin
          # Symlink difft into expected tools/unpacked/ path
          mkdir -p packages/styrby-cli/tools/unpacked
          ln -sf "$(which difft)" packages/styrby-cli/tools/unpacked/difft
          # Create ripgrep launcher script that delegates to system rg
          mkdir -p packages/styrby-cli/scripts
          cat > packages/styrby-cli/scripts/ripgrep_launcher.cjs << 'SCRIPT'
          const { spawn } = require('child_process');
          const args = JSON.parse(process.argv[2] || '[]');
          const child = spawn('rg', args, { stdio: 'inherit' });
          child.on('close', (code) => process.exit(code || 0));
          child.on('error', () => process.exit(1));
          SCRIPT

      - name: Build CLI (needed by src/perf/__tests__/startup.test.ts)
        run: pnpm --filter styrby-cli build

      - name: Run CLI tests
        run: pnpm --filter styrby-cli run test -- --coverage

  # ─── Web unit tests ───
  test-web:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, build-shared]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Run web unit tests
        run: pnpm --filter styrby-web run test

  # ─── Security scanning ───
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        # WHY continue-on-error: 9 upstream-locked CVEs remain that cannot be
        # fixed without Expo SDK 55+, jest-expo, or resend releasing updates.
        # All patchable CVEs have been resolved via pnpm overrides.
        # Remove continue-on-error when upstream deps ship fixes.
        continue-on-error: true
        # Known upstream unpatched CVEs — upgrade deps or add overrides if CI fails:
        #   @modelcontextprotocol/sdk:
        #     - GHSA-345p-7cg4-v4c7 (SSRF via fetch in MCP SDK)
        #   tar via expo -> cacache -> tar:
        #     - GHSA-8qq5-rm4j-mr97 (arbitrary file creation via symlink)
        #     - GHSA-r6q2-hw4h-h46w (path traversal in tar extraction)
        #     - GHSA-34x7-hfp2-rc4v (denial of service via crafted tar)
        # Check current state with: pnpm audit
        run: pnpm audit --audit-level=high

      - name: Secret pattern scan
        run: |
          echo "Scanning for leaked secrets in source..."
          # FIX-057: Comprehensive secret patterns covering all services in use
          # Stripe live keys, AWS access keys, private keys, GitHub tokens,
          # Supabase service keys, Polar tokens, Resend keys, Expo tokens
          PATTERNS='sk_live_[a-zA-Z0-9]{24,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY|ghp_[a-zA-Z0-9]{36}|glpat-[a-zA-Z0-9\-]{20}|sbp_[a-zA-Z0-9]{40}|polar_at_[a-zA-Z0-9]+|re_[a-zA-Z0-9]{20,}|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_-]{50,}|expo_[a-zA-Z0-9]{20,}'

          # WHY two-step: piping grep | grep -v can fail unpredictably in
          # GitHub Actions when the first grep has zero matches. Storing to
          # a temp file avoids pipe exit code issues.
          grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" -E "$PATTERNS" . \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git --exclude-dir=dist \
            --exclude=package-lock.json --exclude=pnpm-lock.yaml --exclude=env.ts \
            > /tmp/secret-scan-results.txt 2>/dev/null || true

          if [ -s /tmp/secret-scan-results.txt ]; then
            echo "::error::Potential secrets found in source code!"
            cat /tmp/secret-scan-results.txt
            exit 1
          fi
          echo "No secrets detected."

      # WHY direct pip install instead of returntocorp/semgrep-action:
      # Both returntocorp/semgrep-action AND semgrep/semgrep-action are
      # deprecated (the official guidance is to install Semgrep CLI directly).
      # The deprecated action pinned Semgrep CLI 1.36.0 — 124 versions
      # behind current. Direct install lets us pin a current version
      # explicitly via PIP_VERSION.
      - name: Install Semgrep
        run: pip install semgrep==1.160.0

      - name: Semgrep SAST
        # WHY no continue-on-error: We bumped from CLI 1.36.0 -> 1.160.0
        # (124 versions). The previously-suppressed false positive on
        # dangerouslySetInnerHTML for JSON-LD <script> tags is mitigated
        # in two ways:
        #   1. Newer Semgrep rules treat JSON.stringify as a sanitizer
        #      and don't flag the JSON-LD pattern
        #   2. The 3 legitimate JSON-LD usages and 1 sanitized chart usage
        #      have explicit `// nosemgrep` annotations with rationale
        # If a real new finding lands, this gate now hard-fails the pipeline.
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --error \
            --metrics off

  # ─── Shared package build ───
  # Cost-optimization (2026-04-30): runs in parallel with `quality` (no `needs:`).
  # Reasoning: `quality` previously built shared internally for type-declarations;
  # we keep that since type-checking is the true gate (no shared build = no
  # tsc against @styrby/shared types). But there is no reason to wait for
  # `quality` to succeed before producing the artifact — they consume the same
  # source. Running them in parallel saves ~30-45s of critical path.
  build-shared:
    name: Build Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @styrby/shared build

      - name: Upload shared build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/
          retention-days: 1
          if-no-files-found: warn

  # ─── CLI package build ───
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: [quality, build-shared]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Build CLI
        run: pnpm --filter styrby-cli run build

      - name: Test CLI entry point
        run: |
          # Verify CLI can at least show help
          node packages/styrby-cli/bin/styrby.mjs help || echo "CLI help check completed"

      # WHY upload CLI build artifact (Phase 1.6.12):
      # The bundle-size job now checks styrby-cli/dist/index.js size via
      # size-limit. Without this artifact upload, the bundle-size job would
      # have to rebuild the CLI from scratch, doubling that job's runtime.
      - name: Upload CLI build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-build
          path: packages/styrby-cli/dist/
          retention-days: 1
          if-no-files-found: warn

  # ─── Web package build ───
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [changes, quality, build-shared]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Cache Next.js build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/styrby-web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/styrby-web/**/*.ts', 'packages/styrby-web/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build web
        run: pnpm --filter styrby-web build

      # Turbopack creates files with colons in names which can't be uploaded
      # Rename them before uploading
      - name: Prepare artifact
        run: |
          cd packages/styrby-web/.next
          # Find and rename files with colons (replace : with __)
          find . -name "*:*" -type f | while read f; do
            newname=$(echo "$f" | sed 's/:/__/g')
            mkdir -p "$(dirname "$newname")"
            mv "$f" "$newname"
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nextjs-build
          path: packages/styrby-web/.next
          retention-days: 1
          include-hidden-files: true
          if-no-files-found: warn

  # ─── Mobile (Expo) build check ───
  build-mobile:
    name: Build Mobile
    runs-on: ubuntu-latest
    needs: [changes, build-shared]
    # Mobile build is the slowest single job (~3-5 min). Skip when mobile
    # source didn't change. Shared changes still trigger because mobile
    # imports from @styrby/shared.
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cost-optimization (2026-04-30): use the build-shared artifact instead
      # of rebuilding locally. Metro requires @styrby/shared/dist/index.js to
      # exist for module resolution; downloading the artifact satisfies that
      # without paying the ~30s rebuild cost on every CI run.
      - name: Download shared build (required by Metro resolution)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Lint mobile
        run: pnpm --filter styrby-mobile run lint

      - name: Export iOS bundle (build check)
        # WHY --platform ios instead of --platform web: styrby-mobile uses
        # react-native-pager-view and expo-av which are native-only packages
        # with no web equivalents. Exporting for web fails at the bundling
        # stage because Metro cannot resolve native-only codegen modules
        # (react-native/Libraries/Utilities/codegenNativeCommands) on web.
        # The iOS export runs the same JS transform pipeline and catches all
        # meaningful compilation errors without requiring web-compatible
        # alternatives for every native package.
        # WHY no || echo: Previously `|| echo "..."` silently swallowed Expo
        # export failures. The iOS bundle export is the correct build check
        # for this mobile-only Expo app, and it must fail CI loudly on error.
        run: pnpm --filter styrby-mobile exec expo export --platform ios --output-dir /tmp/expo-export

  # ─── E2E tests ───
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, build-web]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nextjs-build
          path: packages/styrby-web/.next

      - name: Cache Playwright
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright
        run: pnpm --filter styrby-web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter styrby-web run test:e2e

      - name: Upload failure artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: packages/styrby-web/playwright-report/
          retention-days: 7

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    # WHY needs both build-web AND build-shared AND build-cli:
    # Phase 1.6.12 extends the bundle-size job from web-only chunk inspection
    # to per-package caps via size-limit. We need all three builds present
    # to run size-limit against CLI dist, shared dist, and web chunks together.
    needs: [changes, build-web, build-shared, build-cli]
    # Bundle size is gated on web/cli/shared because each entry in
    # .size-limit.js measures one of those packages. Mobile-only PRs don't
    # need this check — mobile is measured by perf-budgets instead.
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shared build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Download CLI build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-build
          path: packages/styrby-cli/dist/

      - name: Download web build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nextjs-build
          path: packages/styrby-web/.next

      # ── Step 1: Per-chunk guard (pre-existing, retained from Phase 1.6.0) ──
      # This catches individual chunks that exceed 750 KB (e.g., a single
      # vendor chunk that grows unexpectedly). Complementary to size-limit which
      # checks the total first-load sum.
      #
      # Initial-load chunks: 500KB warn, 750KB fail
      # Async-loaded chunks: tracked but never fail CI (loaded on demand,
      # don't affect initial page weight). Next.js names async chunks
      # "<id>.<hash>.js" (dot separator); initial chunks "<name>-<hash>.js" (dash).
      # The libsodium WASM (~700KB) is async-loaded and excluded from initial budget.
      - name: Per-chunk size guard (initial chunks <= 750 KB each)
        run: |
          echo "## Per-Chunk Size Report" >> $GITHUB_STEP_SUMMARY
          echo '| File | Size | Load |' >> $GITHUB_STEP_SUMMARY
          echo '|------|------|------|' >> $GITHUB_STEP_SUMMARY

          WARN=0
          FAIL=0

          for f in $(find packages/styrby-web/.next/static/chunks -name "*.js" -type f 2>/dev/null | sort); do
            SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "0")
            SIZE_KB=$((SIZE / 1024))
            NAME=$(basename "$f")

            STEM="${NAME%.js}"
            if [[ "$STEM" == *.* ]]; then
              LOAD="async"
            else
              LOAD="initial"
            fi

            if [ "$LOAD" = "initial" ] && [ "$SIZE_KB" -gt 750 ]; then
              echo "| \`$NAME\` | **${SIZE_KB}KB** :x: | $LOAD |" >> $GITHUB_STEP_SUMMARY
              FAIL=$((FAIL + 1))
            elif [ "$LOAD" = "initial" ] && [ "$SIZE_KB" -gt 500 ]; then
              echo "| \`$NAME\` | **${SIZE_KB}KB** :warning: | $LOAD |" >> $GITHUB_STEP_SUMMARY
              WARN=$((WARN + 1))
            elif [ "$SIZE_KB" -gt 200 ]; then
              echo "| \`$NAME\` | ${SIZE_KB}KB | $LOAD |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Chunks > 500KB: $WARN warnings, $FAIL failures" >> $GITHUB_STEP_SUMMARY

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL chunk(s) exceed 750KB per-chunk limit. See table above."
            exit 1
          fi

      # ── Step 2: Per-package total caps via size-limit (Phase 1.6.12) ──
      #
      # WHY size-limit over a pure shell script:
      # - Industry standard (used by React, Next.js, tRPC, Preact)
      # - Handles gzip accounting accurately (not just raw file size)
      # - JSON output enables precise error messages with budget + actual + overage
      # - Config lives in .size-limit.js at repo root (versioned, reviewable)
      #
      # THRESHOLDS (see .size-limit.js for full rationale):
      #   styrby-web first-load JS (gzip):     600 KB
      #   styrby-cli dist/index.js (raw):      4 MB
      #   styrby-cli dist/index.js (gzip):     1.2 MB
      #   styrby-shared dist/ total (raw):     600 KB
      - name: Per-package size-limit check
        run: |
          echo "## Per-Package Size-Limit Report (Phase 1.6.12)" >> $GITHUB_STEP_SUMMARY

          # Run size-limit and capture JSON output for the step summary
          # WHY --json: structured output lets us emit a well-formatted table
          # and extract precise overage numbers for the error message.
          SIZE_OUTPUT=$(pnpm run size:json 2>&1) || SIZE_EXIT=$?

          # Parse and display results in step summary
          echo "$SIZE_OUTPUT" | node -e "
            const lines = require('fs').readFileSync('/dev/stdin','utf8');
            // Extract the JSON array from size-limit output (it may have
            // non-JSON prefix lines from pnpm)
            const jsonMatch = lines.match(/(\[[\s\S]+\])/);
            if (!jsonMatch) {
              console.log('Could not parse size-limit JSON output');
              process.exit(0);
            }
            const results = JSON.parse(jsonMatch[1]);

            console.log('| Package | Size | Budget | Status |');
            console.log('|---------|------|--------|--------|');
            let anyFailed = false;
            for (const r of results) {
              const passed = r.passed !== false;
              const status = passed ? ':white_check_mark: OK' : ':x: EXCEEDED';
              if (!passed) anyFailed = true;
              console.log(\`| \${r.name} | \${r.size} | \${r.sizeLimit} | \${status} |\`);
            }
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "$SIZE_OUTPUT" >> $GITHUB_STEP_SUMMARY

          # Re-run without --json for the human-readable error output to stderr
          # if size-limit failed (it prints per-entry failures to stdout by default)
          if [ "${SIZE_EXIT:-0}" -ne 0 ]; then
            echo ""
            echo "--- size-limit output ---"
            pnpm run size || true
            echo "::error::One or more package size budgets exceeded. See the 'Per-Package Size-Limit Report' table above for details."
            echo "To investigate: run \`pnpm run size:json\` locally after building all packages."
            exit 1
          fi

  # ─── Performance budgets: CLI startup + mobile cold-start proxy (Phase 1.6.12) ───
  perf-budgets:
    name: Performance Budgets
    runs-on: ubuntu-latest
    needs: [changes, build-shared, build-cli, build-mobile]
    # Perf budgets cover CLI startup time + mobile cold-start proxy. Skip
    # on web-only PRs.
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.mobile == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cost-optimization (2026-04-30): use the build-shared artifact instead
      # of a local rebuild. The mobile test mapper imports from
      # @styrby/shared/dist/* which the artifact provides.
      - name: Download shared build (needed by mobile test mapper)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shared-build
          path: packages/styrby-shared/dist/

      - name: Download CLI build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-build
          path: packages/styrby-cli/dist/

      # ── CLI startup-time budget ──
      # Measures cold `node dist/index.js --version` and `status` startup time.
      # Budgets: --version <= 500 ms, status <= 600 ms (see test file for rationale).
      # WHY vitest run (not pnpm test): The CLI test suite uses vitest; we run
      # only the perf test file to avoid running all CLI unit tests here.
      - name: CLI startup-time budget test
        run: |
          echo "## CLI Startup-Time Budget" >> $GITHUB_STEP_SUMMARY
          pnpm --filter styrby-cli exec vitest run src/perf/__tests__/startup.test.ts 2>&1 | tee /tmp/cli-startup-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          # Extract timing lines from test output for step summary
          grep "\[perf\]" /tmp/cli-startup-output.txt >> $GITHUB_STEP_SUMMARY || true

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::CLI startup budget exceeded. See test output above for details."
            exit 1
          fi

      # ── Mobile cold-start proxy budget ──
      # Measures root layout import depth, provider nesting, and app-layer
      # total imports as proxies for cold-start time (Detox not available in CI).
      # See test file for full rationale and follow-up notes for Detox lane.
      - name: Mobile cold-start proxy budget test
        run: |
          echo "## Mobile Cold-Start Proxy Budget" >> $GITHUB_STEP_SUMMARY
          pnpm --filter styrby-mobile exec jest src/__tests__/cold-start-proxy.test.ts --testPathPattern="cold-start-proxy" 2>&1 | tee /tmp/mobile-coldstart-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          grep "\[perf\]" /tmp/mobile-coldstart-output.txt >> $GITHUB_STEP_SUMMARY || true

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Mobile cold-start proxy budget exceeded. See test output above."
            exit 1
          fi

  # ─── Summary ───
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, quality, test-shared, test-cli, test-web, security, build-shared, build-cli, build-web, build-mobile, e2e, bundle-size, perf-budgets]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo '| Job | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|--------|' >> $GITHUB_STEP_SUMMARY

          FAILED=0

          check_job() {
            local name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              echo "| $name | :white_check_mark: passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "$result" = "skipped" ]; then
              echo "| $name | :fast_forward: skipped |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | :x: $result |" >> $GITHUB_STEP_SUMMARY
              FAILED=$((FAILED + 1))
            fi
          }

          check_job "Quality" "${{ needs.quality.result }}"
          check_job "Shared Tests" "${{ needs.test-shared.result }}"
          check_job "CLI Tests" "${{ needs.test-cli.result }}"
          check_job "Web Tests" "${{ needs.test-web.result }}"
          # Security job now hard-fails on high CVEs (continue-on-error removed 2026-03-27).
          check_job "Security" "${{ needs.security.result }}"
          check_job "Build Shared" "${{ needs.build-shared.result }}"
          check_job "Build CLI" "${{ needs.build-cli.result }}"
          check_job "Build Web" "${{ needs.build-web.result }}"
          check_job "Build Mobile" "${{ needs.build-mobile.result }}"
          check_job "E2E Tests" "${{ needs.e2e.result }}"
          check_job "Bundle Size" "${{ needs.bundle-size.result }}"
          check_job "Perf Budgets" "${{ needs.perf-budgets.result }}"

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":x: **$FAILED job(s) failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":white_check_mark: **All checks passed**" >> $GITHUB_STEP_SUMMARY
