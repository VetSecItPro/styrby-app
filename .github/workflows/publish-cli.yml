# Publish Styrby CLI to npm
#
# WHY: This workflow publishes with npm Provenance, which cryptographically
# proves the package came from this repository via GitHub Actions.
# This is what professional packages do for supply chain security.
#
# TRIGGER: Manually via workflow_dispatch, or when a release is published
#
# REQUIREMENTS:
# 1. NPM_TOKEN secret must be set in GitHub repo settings
# 2. npm account must have 2FA enabled
# 3. Package name "styrby-cli" must be available (it is)

name: Publish CLI to npm

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        type: boolean
        default: false

  # Auto-trigger on release
  release:
    types: [published]

# Ensure only one publish runs at a time
concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    # Required for npm provenance
    permissions:
      contents: read
      id-token: write

    steps:
      # SEC-009 FIX: SHA-pinned actions for supply-chain security
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # WHY pnpm: This is a pnpm monorepo. npm ci fails because there's no
      # package-lock.json. We use pnpm to install, build the shared package
      # (CLI dependency), then build the CLI, then publish with npm for
      # provenance support.
      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        # WHY node 22: CI uses Node 22 (see ci.yml NODE_VERSION env). Using a
        # different version here means the published package was tested against
        # a different runtime than the one used to validate it. Pinned to 22
        # for consistency. npm registry still accepts packages built on any
        # modern Node LTS — this only affects the build/test environment.
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @styrby/shared build

      - name: Build CLI
        run: pnpm --filter styrby-cli build

      - name: Run CLI tests
        run: pnpm --filter styrby-cli test

      - name: Test CLI binary
        run: node packages/styrby-cli/dist/index.js --help

      - name: Verify package contents
        run: npm pack --dry-run
        working-directory: packages/styrby-cli

      - name: Publish to npm (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npm publish --dry-run
        working-directory: packages/styrby-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with provenance
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --provenance --access public
        working-directory: packages/styrby-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        if: ${{ github.event.inputs.dry_run != 'true' }}
        # WHY set -euo pipefail + retry loop: npm registry propagation takes
        # a few seconds. A bare `sleep 10` is fragile — too short on a slow
        # registry day, too long otherwise. The loop polls up to 30s with
        # set -e so a hard failure (npm CLI itself broken) still fails loudly.
        run: |
          set -euo pipefail
          for i in $(seq 1 6); do
            if npm view styrby-cli version 2>/dev/null; then
              echo "Package verified on npm registry."
              exit 0
            fi
            echo "Waiting for npm registry propagation... attempt $i/6"
            sleep 5
          done
          echo "::error::Package not found on npm registry after 30s. Check publish step output."
          exit 1
