[package]
name = "styrby-native"
version = "0.1.0"
edition = "2021"
description = "Rust native module for Styrby — SIMD-accelerated JSONL parsing and file watching"
authors = ["Steel Motion LLC <security@steelmotionllc.com>"]
license = "SEE LICENSE IN LICENSE"
repository = "https://github.com/VetSecItPro/styrby-app"

# WHY: napi-derive macros need lib type "cdylib" to produce a .node shared
# library that Node.js can dlopen. We also include "lib" so Rust unit tests
# (cargo test) can link the crate normally without a Node.js host process.
[lib]
crate-type = ["cdylib", "lib"]
name = "styrby_native"

[features]
default = []

# WHY: napi-rs uses a feature-gated approach to control the Node-API version
# targeted. NAPI v6 covers Node.js 10.23+ and is the minimum we need for
# stable BigInt and ArrayBuffer support used in our batch parser API.
napi6 = ["napi/napi6", "napi-derive/napi6"]
napi8 = ["napi/napi8", "napi-derive/napi8"]

[dependencies]
# napi / napi-derive — Node-API bindings and proc-macro attributes
# WHY: napi-derive's #[napi] macro generates the C shim that exports Rust
# functions to Node.js without manual FFI boilerplate.
napi = { version = "2", features = ["napi6", "async"] }
napi-derive = { version = "2", features = ["napi6"] }

# simd-json — SIMD-accelerated JSON parser (tape-based, zero-copy where possible)
# WHY: simd_json uses CPU SIMD intrinsics (SSE4.2 / AVX2 on x86, NEON on ARM)
# to scan JSON 4–8× faster than serde_json for large payloads. We need
# mutable input so we use the value API that borrows from a &mut [u8] buffer.
simd-json = { version = "0.14", features = ["allow-non-simd"] }

# serde / serde_json — fallback serialisation and struct derives
# WHY: simd-json can deserialise into serde-derived structs via its owned_value
# API. serde_json is kept as a compile-time-only dep for the non-SIMD fallback
# path and for tests.
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }

# rayon — data-parallelism for batch parsing
# WHY: The batch API splits the file buffer into line slices and parses them
# in parallel using rayon's work-stealing thread pool. This saturates all CPU
# cores on large (>5 MB) files where parse time dominates.
rayon = "1"

# notify — cross-platform file system events (inotify/kqueue/FSEvents)
# WHY: The file watcher module needs low-latency change notifications across
# macOS (FSEvents), Linux (inotify), and Windows (ReadDirectoryChangesW).
# notify v6 unifies those platform APIs behind a single trait.
notify = { version = "6", features = ["serde"] }

# crossbeam-channel — lock-free MPSC channels for watcher → callback bridging
# WHY: The notify watcher runs in its own OS thread and produces events via a
# channel. crossbeam-channel outperforms std::sync::mpsc under high event
# rates (e.g., large file trees) with minimal allocation overhead.
crossbeam-channel = "0.5"

# thiserror — ergonomic error type derives
thiserror = "1"

[build-dependencies]
# napi-build — generates the necessary linker flags for .node output
napi-build = "2"

[profile.release]
# WHY: lto = true enables Link-Time Optimisation across crate boundaries,
# which allows LLVM to inline hot paths between simd-json, rayon, and our
# parser code. Measured 10–15% throughput improvement on the 50 MB benchmark.
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"

[profile.dev]
opt-level = 1

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }
